name: Salesforce Product Health

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  product-health:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Auth to Salesforce
        run: |
          echo "${{ secrets.SF_PROD_AUTH_URL }}" > ./sf-auth-url.txt
          sf org login sfdx-url --sfdx-url-file ./sf-auth-url.txt --alias health-org

      - name: Check product health
        run: |
          mkdir -p reports

          echo "## Salesforce Product Health" | tee reports/product-health.md
          echo "" | tee -a reports/product-health.md
          echo "Generated at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" | tee -a reports/product-health.md
          echo "" | tee -a reports/product-health.md

          echo "### Active Products" | tee -a reports/product-health.md
          sf data query \
            --target-org health-org \
            --query "SELECT COUNT() FROM Product2 WHERE IsActive = true" \
            | tee -a reports/product-health.md
          echo "" | tee -a reports/product-health.md

          echo "### Products Missing Product Code" | tee -a reports/product-health.md
          sf data query \
            --target-org health-org \
            --query "SELECT Id, Name, ProductCode, IsActive FROM Product2 WHERE ProductCode = null LIMIT 50" \
            | tee -a reports/product-health.md
          echo "" | tee -a reports/product-health.md

          echo "### Active Pricebooks" | tee -a reports/product-health.md
          sf data query \
            --target-org health-org \
            --query "SELECT Id, Name, IsStandard, IsActive FROM Pricebook2 WHERE IsActive = true" \
            | tee -a reports/product-health.md
          echo "" | tee -a reports/product-health.md

          echo "### Products Without Active Pricebook Entry" | tee -a reports/product-health.md
          sf data query \
            --target-org health-org \
            --query "SELECT Id, Name, ProductCode FROM Product2 WHERE IsActive = true AND Id NOT IN (SELECT Product2Id FROM PricebookEntry WHERE IsActive = true) LIMIT 50" \
            | tee -a reports/product-health.md

      - name: Validate product health rules
        run: |
          sf data query \
            --target-org health-org \
            --query "SELECT Id FROM Product2 WHERE IsActive = true AND ProductCode = null LIMIT 1" \
            --json > missing-product-code.json

          sf data query \
            --target-org health-org \
            --query "SELECT Id FROM Product2 WHERE IsActive = true AND Id NOT IN (SELECT Product2Id FROM PricebookEntry WHERE IsActive = true) LIMIT 1" \
            --json > missing-pricebook-entry.json

          missing_product_code="$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('missing-product-code.json','utf8')); console.log(data.result.totalSize || 0)")"
          missing_pricebook_entry="$(node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('missing-pricebook-entry.json','utf8')); console.log(data.result.totalSize || 0)")"

          echo "Missing product code count: ${missing_product_code}"
          echo "Missing active pricebook entry count: ${missing_pricebook_entry}"

          if [ "${missing_product_code}" -gt 0 ] || [ "${missing_pricebook_entry}" -gt 0 ]; then
            echo "Product health validation failed. Download product-health-report for details."
            exit 1
          fi

      - name: Upload product health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-health-report
          path: reports/product-health.md
